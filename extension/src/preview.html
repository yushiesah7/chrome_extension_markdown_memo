<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>プレビュー | Mermaid Markdown Memo</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="preview.css" />
  </head>
  <body>
    <div class="app" data-theme="dark">
      <aside class="sidebar">
        <header class="sidebar__header">
          <div class="sidebar__title">
            <h2 aria-live="polite">メモ <span id="noteCount">0</span></h2>
          </div>
          <div class="sidebar__actions">
            <button class="icon-button ghost" id="sortToggle" aria-label="並び替え方向">
              <span class="sort-icon" aria-hidden="true">⇅</span>
            </button>
            <button class="icon-button primary" id="createNote" aria-label="新規メモ">
              +
            </button>
          </div>
        </header>
        <ol class="note-list" id="noteList" aria-label="メモ一覧"></ol>
      </aside>

      <main class="editor" aria-live="polite">
        <button id="previewButton" type="button" hidden aria-hidden="true"></button>
        <div class="editor__header">
          <div class="editor__title-wrapper">
            <input class="editor__title-input" id="noteTitle" type="text" aria-label="メモタイトル" placeholder="タイトル" />
            <span class="editor__meta" id="noteMeta"></span>
          </div>
          <div class="editor__actions">
            <div class="segmented">
              <button class="segmented__button" id="modeEdit" aria-pressed="true">編集</button>
              <button class="segmented__button" id="modePreview" aria-pressed="false">プレビュー</button>
            </div>
            <button class="copy-button" id="copyAll">全文コピー</button>
            <button class="icon-button" id="deleteNote" title="メモを削除" aria-label="メモを削除">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="editor__body">
          <section class="editor__panel editor__panel--edit" id="editPanel">
            <textarea class="editor__textarea" id="noteBody" aria-label="メモ本文" placeholder="メモ本文を入力してください"></textarea>
          </section>
          <section class="editor__panel editor__panel--preview" id="previewPanel" hidden>
            <div class="preview-container" id="content"></div>
          </section>
        </div>

        <div class="editor__status" aria-live="polite">
          <span class="status-indicator" aria-hidden="true"></span>
          <span class="editor__status-text" id="statusText">待機中</span>
        </div>
      </main>
    </div>

    <script src="lib/mermaid.min.js"></script>
    <script type="module" src="preview.js"></script>
  </body>
</html>
