<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Local Markdown Memo</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <header class="sidebar__header">
          <div class="sidebar__title-group">
            <h1 class="sidebar__title">メモ</h1>
            <p class="sidebar__subtitle">ひらめきをすぐに記録</p>
          </div>
          <div class="sidebar__header-actions">
            <span id="noteCount" class="badge" aria-live="polite">0</span>
            <button
              id="sortToggle"
              class="icon-button"
              title="更新日時で並べ替え"
              aria-label="更新日時で並べ替え"
              type="button"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <polyline points="7 7 12 2 17 7"></polyline>
                <line x1="12" y1="2" x2="12" y2="22"></line>
                <polyline points="17 17 12 22 7 17"></polyline>
              </svg>
              <span class="visually-hidden">更新日時ソート</span>
            </button>
            <button
              id="createNote"
              class="icon-button icon-button--primary"
              title="新規メモを作成"
              aria-label="新規メモを作成"
            >
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              <span class="visually-hidden">新しいメモ</span>
            </button>
          </div>
        </header>
        <ul id="noteList" class="note-list" aria-label="メモ一覧"></ul>
      </aside>
      <main class="editor" aria-live="polite">
        <div class="editor__header">
          <div class="editor__title-wrapper">
            <input
              id="noteTitle"
              class="editor__title-input"
              type="text"
              placeholder="タイトル"
              aria-label="メモタイトル"
            />
            <span id="noteMeta" class="editor__meta">メモを選択してください</span>
          </div>
          <div class="editor__actions">
            <button
              id="deleteNote"
              class="icon-button"
              title="メモを削除"
              aria-label="メモを削除"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
              </svg>
            </button>
          </div>
        </div>
        <textarea
          id="noteBody"
          class="editor__textarea"
          aria-label="メモ本文"
        ></textarea>
        <div class="editor__status" id="editorStatus" aria-live="polite">
          <span class="status-indicator status-indicator--idle" aria-hidden="true"></span>
          <span class="editor__status-text">メモを選択してください</span>
        </div>
      </main>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
