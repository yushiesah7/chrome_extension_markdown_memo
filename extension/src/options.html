        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        padding: 32px;
        width: min(480px, 90vw);

      h1 {
        margin-top: 0;
        font-size: 24px;
        text-align: center;
      }

      p {
        line-height: 1.6;
        margin: 16px 0 0;
        text-align: center;
      }

      .coming-soon {
        display: inline-block;
        margin-top: 24px;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid #2563eb;
        color: #2563eb;
        background: rgba(37, 99, 235, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>設定</h1>
      <p>このページでは、今後ホットキーなどの設定項目を提供予定です。</p>
