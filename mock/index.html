<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock - Local Markdown Memo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" data-theme="dark">
        <header class="sidebar__header">
          <div class="sidebar__title-group">
            <h1 class="sidebar__title">メモ</h1>
          </div>
          <div class="sidebar__header-actions">
            <span class="badge" aria-live="polite">2</span>
            <button class="icon-button" id="mockSortToggle" type="button" title="更新順で並べ替え" aria-label="更新順で並べ替え">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="7 7 12 2 17 7"></polyline>
                <line x1="12" y1="2" x2="12" y2="22"></line>
                <polyline points="17 17 12 22 7 17"></polyline>
              </svg>
              <span class="visually-hidden">更新順ソート</span>
            </button>
            <button class="icon-button icon-button--primary" title="新規メモを作成" aria-label="新規メモを作成" type="button">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              <span class="visually-hidden">新しいメモ</span>
            </button>
          </div>
        </header>

        <ul class="note-list" aria-label="メモ一覧">
          <li class="note-list__item note-list__item--active" tabindex="0" data-updated-at="1734886733000">
            <p class="note-list__title">新しいメモ</p>
            <div class="note-list__footer">
              <span class="note-list__meta">更新: 2025/12/22 23:18:53</span>
              <button class="note-list__delete" type="button" aria-label="このメモを削除">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                </svg>
              </button>
            </div>
          </li>

          <li class="note-list__item" tabindex="0" data-updated-at="1769862361000">
            <p class="note-list__title">あいうえさっっっっっっ…</p>
            <div class="note-list__footer">
              <span class="note-list__meta">更新: 2025/10/04 20:26:01</span>
              <button class="note-list__delete" type="button" aria-label="このメモを削除">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                </svg>
              </button>
            </div>
          </li>
        </ul>
      </aside>

      <main class="editor" data-theme="dark" aria-live="polite">
        <div class="editor__header">
          <div class="editor__title-wrapper">
            <input class="editor__title-input" type="text" value="新しいメモ" aria-label="メモタイトル" />
            <span class="editor__meta">最終更新: 2025/12/22 23:18:53</span>
          </div>

          <div class="editor__actions">
            <button class="button--ghost" id="previewButton" type="button" aria-label="Markdownプレビュー（Mermaid対応）">
              プレビュー
            </button>
            <button class="icon-button" title="メモを削除" aria-label="メモを削除" type="button">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
              </svg>
            </button>
          </div>
        </div>

        <textarea class="editor__textarea" aria-label="メモ本文">メモ本文サンプル

```mermaid
graph TD
  A[Start] --> B[Next]
  B --> C{Decision}
  C -->|Yes| D[Done]
  C -->|No| A
```

箇条書きなどもこの下に続けて書けます。
</textarea>

        <div class="editor__status" aria-live="polite">
          <span class="status-indicator" aria-hidden="true"></span>
          <span class="editor__status-text">編集中</span>
        </div>
      </main>
    </div>
    <div class="preview-backdrop" id="previewBackdrop" hidden></div>
    <div class="preview-modal" id="previewModal" hidden>
      <div class="preview-modal__header">
        <h2 class="preview-modal__title">プレビュー</h2>
        <button class="icon-button" id="previewClose" aria-label="閉じる" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="preview-modal__body" id="previewBody"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      (() => {
        const sortBtn = document.getElementById("mockSortToggle");
        const list = document.querySelector(".note-list");
        let dir = "desc";

        const apply = () => {
          const items = Array.from(list.querySelectorAll("li[data-updated-at]"));
          items
            .sort((a, b) => {
              const at = Number(a.dataset.updatedAt) || 0;
              const bt = Number(b.dataset.updatedAt) || 0;
              return dir === "asc" ? at - bt : bt - at;
            })
            .forEach((el) => list.appendChild(el));
        };

        sortBtn?.addEventListener("click", () => {
          dir = dir === "asc" ? "desc" : "asc";
          apply();
        });

        apply();

        // Mermaid preview
        const previewBtn = document.getElementById("previewButton");
        const modal = document.getElementById("previewModal");
        const backdrop = document.getElementById("previewBackdrop");
        const previewBody = document.getElementById("previewBody");
        const previewClose = document.getElementById("previewClose");
        const textarea = document.querySelector(".editor__textarea");

        const openPreview = () => {
          const text = textarea.value || "";
          previewBody.innerHTML = "";

          const container = document.createElement("div");
          container.className = "preview-markdown";

          // mermaid ブロックを抽出し div.mermaid に変換
          const parts = text.split(/```/);
          let hasMermaid = false;
          for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 1) {
              const block = parts[i];
              const firstLine = block.split("\n")[0].trim();
              if (firstLine === "mermaid") {
                const code = block.split("\n").slice(1).join("\n");
                const el = document.createElement("div");
                el.className = "mermaid";
                el.textContent = code;
                container.appendChild(el);
                hasMermaid = true;
                continue;
              }
            }
            if (parts[i].trim()) {
              const p = document.createElement("pre");
              p.textContent = parts[i];
              container.appendChild(p);
            }
          }

          // Mermaidなしの場合もプレーンテキストで表示
          if (!container.childElementCount) {
            const p = document.createElement("pre");
            p.textContent = text || "(プレビュー対象がありません)";
            container.appendChild(p);
          }

          previewBody.appendChild(container);
          modal.hidden = false;
          backdrop.hidden = false;

          if (hasMermaid && typeof mermaid !== "undefined") {
            mermaid.initialize({ startOnLoad: false, theme: "dark" });
            mermaid.run({ querySelector: ".preview-modal .mermaid" });
          }
        };

        const closePreview = () => {
          modal.hidden = true;
          backdrop.hidden = true;
        };

        previewBtn?.addEventListener("click", openPreview);
        previewClose?.addEventListener("click", closePreview);
        backdrop?.addEventListener("click", closePreview);
        window.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && !modal.hidden) {
            closePreview();
          }
        });
      })();
    </script>
  </body>
</html>
